<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1 class="first">🕹️ margin e padding - estilo gamer</h1>
<div class="second">
    <h4>🎯 Padding: 30px — espaço interno</h4>
    <h4>O escudo azul cresceu para dentro.</h4>
</div>
<div class=" third">
    <p>⚔️⚔️ Margin: 30px — espaço externo</p>
    <p>O bloco verde se afastou dos outros.</p>
</div>
<div class="fourth">
    <h4> 🔥 Margin: 20px + Padding: 20px</h4>
    <h4>Margin afasta por fora. Padding cresce por dentro.</h4>
</div>
</body>
